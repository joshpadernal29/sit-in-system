<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>login page</title>
</head>

<body>
    <!--navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-2 sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="bg-white rounded-circle shadow d-flex align-items-center justify-content-center p-1 me-3"
                    style="width: 65px; height: 65px; border: 2px solid rgba(255,255,255,0.3);">
                    <img src="assets/uclogo2.png" class="rounded-circle"
                        style="width: 100%; height: 100%; object-fit: contain;" alt="UC Logo">
                </div>

                <div class="lh-1">
                    <span class="fw-bold d-block mb-0 h6 text-white" style="letter-spacing: 0.5px;">
                        SIT-IN MONITORING SYSTEM
                    </span>
                    <small class="text-white-50 text-uppercase fw-semibold"
                        style="font-size: 0.65rem; letter-spacing: 1px;">
                        University of Cebu Main-Campus
                    </small>
                </div>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-auto nav-underline">
                    <li class="nav-item"><a class="nav-link active fw-medium px-3 text-white" href="index.html">Home</a>
                    </li>
                    <li class="nav-item"><a class="nav-link fw-medium px-3 text-white" href="about.html">About</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link fw-medium px-3 text-white dropdown-toggle" href="#"
                            data-bs-toggle="dropdown">Community</a>
                        <ul class="dropdown-menu border-0 shadow-sm mt-2">
                            <li><a class="dropdown-item py-2" href="#">Announcements</a></li>
                            <li><a class="dropdown-item py-2" href="#">Lab Guidelines</a></li>
                            <li><a class="dropdown-item py-2" href="#">Student Hub</a></li>
                        </ul>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                    <a href="login.html" class="btn btn-link text-white text-decoration-none fw-medium px-3">Login</a>
                    <a href="register.html"
                        class="btn btn-light text-primary fw-bold px-4 rounded-pill shadow-sm">Register</a>
                </div>
            </div>
        </div>
    </nav>
    <!--end of navbar-->
    <!--main content-->
    <br>
    <main>
        <div class="container-fluid">
            <div class="row">
                <div class="col-sm-3 col-md-6">
                    <img src="assets/ccsmainlogo2.png" style="width: 80%;" class="d-block mx-auto">
                </div>
                <div class="col-sm-9 col-md-6 p-5">
                    <div class="card p-4 shadow">
                        <div class="card-body p-2">
                            <h3 class="text-center">User Login</h3>
                            <form action="#">
                                <div class="form-floating mb-3 mt-3">
                                    <input type="text" class="form-control" id="student-id" placeholder="STUDENT ID"
                                        name="student-id" required>
                                    <label for="student-id" class="form-label text-secondary">Student Id</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="pwd" placeholder="Password"
                                        name="pswd" required>
                                    <label for="pwd" class="form-label text-secondary">Password</label>
                                </div>
                                <div class="form-check mb-3">
                                    <label class="form-check-label">
                                        <input class="form-check-input" type="checkbox" name="remember"> Remember me
                                    </label>
                                </div>
                                <div class="d-flex justify-content-end">
                                    <button type="button" class="btn btn-primary ">Login</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!--end of main content-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
